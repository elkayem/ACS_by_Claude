# Default configuration: large GEO communications satellite with two large
# solar array wings deployed along the +/- pitch (y) axis.
#
# Units: SI unless noted (kg*m^2, N*m, N*m*s, rad/s, Hz, seconds).
# Body axes: x = roll (velocity direction at nadir attitude), y = pitch
# (orbit anti-normal), z = yaw (nadir).

spacecraft:
  inertia:
    - [8000.0,    0.0,    0.0]
    - [   0.0, 4500.0,    0.0]
    - [   0.0,    0.0, 6500.0]
  # Mass-normalized appendage modes; participation is the 3-vector rotational
  # coupling into [roll, pitch, yaw] (units sqrt(kg)*m). The squared magnitude
  # is the modal contribution to the effective inertia about that axis.
  modes:
    - {freq_hz: 0.10, damping: 0.005, participation: [45.0,  0.0,  0.0]}  # 1st out-of-plane array bending
    - {freq_hz: 0.15, damping: 0.005, participation: [ 0.0,  0.0, 35.0]}  # 1st in-plane array bending
    - {freq_hz: 0.35, damping: 0.005, participation: [ 0.0, 25.0,  0.0]}  # array torsion
    - {freq_hz: 0.55, damping: 0.005, participation: [18.0,  0.0,  5.0]}  # 2nd out-of-plane bending

orbit_rate: 7.2921159e-5  # GEO sidereal rate, rad/s

wheels:
  ideal: false        # true = unlimited torque source, no momentum tracking
  max_torque: 0.2     # N*m, per body axis
  max_momentum: 68.0  # N*m*s, per body axis

sensors:
  perfect: false
  gyro_rate_noise: 1.0e-6          # rad/s 1-sigma, per axis per sample
  gyro_bias: [2.0e-7, -1.0e-7, 1.5e-7]  # rad/s
  star_tracker_noise_arcsec: 10.0  # 1-sigma per axis
  seed: 42

environment:
  gravity_gradient: true
  srp:
    enabled: true
    constant: [1.0e-5, 5.0e-5, 1.0e-5]            # N*m, body frame
    harmonic_amplitude: [5.0e-5, 0.0, 5.0e-5]     # N*m at orbit rate

# Momentum unload thrusters. The constant pitch SRP torque accumulates
# ~4.3 N*m*s/day, so the wheels need an unload roughly every 1-2 weeks.
# Pulses are width-modulated per controller cycle with a minimum impulse bit
# of torque * min_on_time_s; the proportional request accumulates until a
# full minimum pulse is warranted (intermittent pulse train).
thrusters:
  enabled: false       # `acs unload` enables this for its demo
  # Thruster torque is sized so a minimum pulse's cycle-average (torque *
  # min_on_time / ctrl period = 0.08 N*m) stays inside the wheel torque
  # limit, so the feedforward compensation can fully cancel each pulse.
  torque: 1.0          # N*m per axis while firing
  min_on_time_s: 0.02  # minimum pulse width -> 0.02 N*m*s impulse bit
  unload:
    trigger: 40.0      # N*m*s: start unload when any axis exceeds
    target: 2.0        # N*m*s: stop when all axes below
    rate_gain: 0.002   # 1/s: requested torque = gain * h_w (~0.08 N*m at trigger)
    feedforward_compensation: true  # wheels counter the thruster torque

controller:
  rate_hz: 4.0       # discrete execution rate
  delay_s: 0.0       # additional computation delay (frequency analysis)
  feedforward: true  # J*alpha_cmd feedforward during profiled slews
  # Gains are computed per axis from the design rule (Kp = J*wn^2,
  # Kd = 2*zeta*J*wn, Ki = Kp*wn/integral_time_factor) unless kp/ki/kd are
  # given explicitly below.
  # Per-axis bandwidths: each axis runs as fast as its own first flexible
  # mode allows. Roll is limited by the 0.116 Hz coupled bending mode; pitch
  # sees no mode below 0.377 Hz and runs ~2x faster.
  design:
    bandwidth_hz: [0.030, 0.055, 0.038]  # roll, pitch, yaw
    damping: 0.7
    integral_time_factor: 10.0
  # kp: [...]   # explicit per-axis gains override the design rule
  # ki: [...]
  # kd: [...]
  # Structural filters: notches gain-stabilize each significant flexible
  # resonance at its coupled (free-free) frequency — the cantilever mode
  # frequency shifted up by sqrt(J/(J - l^2)). Each notch is assigned only
  # to the axis that needs it, so no axis pays phase lag at crossover for
  # another axis's mode. Notch width (damping) is sized to hold the mode
  # peak below about -12 dB across +/-15% modal frequency uncertainty.
  filters:
    - {type: notch, freq_hz: 0.116,  damping: 0.40, depth_db: 40.0, axes: roll}   # roll 1st bending (coupled)
    - {type: notch, freq_hz: 0.5615, damping: 0.25, depth_db: 25.0, axes: roll}   # roll 2nd bending (coupled)
    - {type: notch, freq_hz: 0.166,  damping: 0.35, depth_db: 32.0, axes: yaw}    # yaw 1st bending (coupled)
    - {type: notch, freq_hz: 0.374,  damping: 0.25, depth_db: 27.0, axes: pitch}  # pitch torsion (coupled)
    - {type: lowpass, freq_hz: 0.7, damping: 0.7}                                 # high-frequency roll-off

guidance:
  mode: nadir   # track the LVLH frame (z to nadir) at orbit rate
  # mode: inertial with q_inertial: [w, x, y, z] holds a fixed attitude
  # Note on step size: with the default gains the wheels saturate for
  # attitude errors above a few hundredths of a degree, so any sizable raw
  # step becomes a torque-limited slew with saturation-driven overshoot.
  # Use the slew profiler (below) for large-angle maneuvers.
  step:
    axis: [1.0, 0.0, 0.0]  # body axis of the commanded attitude step / slew
    angle_deg: 1.0
    time_s: 100.0
  # Smooth slew profiler: when enabled, the step above is executed as an
  # eigenaxis slew with a cycloidal (continuous-acceleration) profile, and
  # the controller applies J*alpha_cmd acceleration feedforward (see
  # controller.feedforward). When disabled the step is discontinuous.
  profiler:
    enabled: false
    max_rate_dps: 0.05      # deg/s
    max_accel_dps2: 0.001   # deg/s^2 (J*a ~ 0.14 N*m on roll, inside wheel limit)

simulation:
  duration_s: 900.0
  substeps: 10          # RK4 integration steps per controller sample
  settling_band: 0.02   # settling criterion, fraction of step amplitude
