# Default configuration: large GEO communications satellite with two large
# solar array wings deployed along the +/- pitch (y) axis.
#
# Units: SI unless noted (kg*m^2, N*m, N*m*s, rad/s, Hz, seconds).
# Body axes: x = roll (velocity direction at nadir attitude), y = pitch
# (orbit anti-normal), z = yaw (nadir).

spacecraft:
  mass: 3000.0  # kg total (wet); sets the slosh CM-shift coupling
  # North-south (pitch-axis) solar array geometry: two ~120 kg wings with
  # CMs at ~+/-6.5 m load roll (x) and yaw (z) nearly equally through the
  # parallel-axis term (~12000 kg*m^2 total), while pitch (y) sees only the
  # hub plus the panel-width term — hence roll/yaw ~5x pitch.
  inertia:
    - [15000.0,    0.0,     0.0]
    - [    0.0, 3000.0,     0.0]
    - [    0.0,    0.0, 14500.0]
  # Solar array drive angle about pitch (deg). The arrays rotate once per
  # day; modes flagged rotates_with_array have their participation defined
  # at 0 deg and rotated with the drive, so the out-of-plane bending mode
  # couples to roll at 0 deg and to yaw at 90 deg. The Monte Carlo samples
  # this angle uniformly over [0, 360) — fixed gains must hold everywhere.
  array_angle_deg: 0.0
  # Propellant tanks, each reduced to its first lateral slosh mode (two
  # equivalent rotational modes per tank, see slosh.py). Slosh mass comes
  # from the SP-106 spherical-tank fit at the given fill fraction unless
  # slosh_mass is given explicitly. freq_hz/damping are the tank-fixed
  # zero-g values.
  #
  # DERIVED TANK REQUIREMENT: slosh damping >= 0.004 (PMD-class). The Monte
  # Carlo shows the design passes 100% with a zeta 0.004-0.02 dispersion but
  # only ~65% with bare-tank damping (0.001 floor) — and better slosh
  # frequency knowledge does NOT recover it (damping, not frequency, is the
  # binding parameter). Values below assume PMD vanes in the tanks.
  tanks:
    - {propellant_mass: 700.0, fill_fraction: 0.5, location: [0.0, 0.0,  0.9],
       axis: [0.0, 0.0, 1.0], freq_hz: 0.007, damping: 0.008}  # oxidizer
    - {propellant_mass: 430.0, fill_fraction: 0.5, location: [0.0, 0.0, -0.9],
       axis: [0.0, 0.0, 1.0], freq_hz: 0.009, damping: 0.008}  # fuel
  # Mass-normalized appendage modes; participation is the 3-vector rotational
  # coupling into [roll, pitch, yaw] (units sqrt(kg)*m). The squared magnitude
  # is the modal contribution to the effective inertia about that axis.
  modes:
    - {freq_hz: 0.10, damping: 0.005, participation: [55.0,  0.0,  0.0],
       rotates_with_array: true}  # 1st out-of-plane array bending
    - {freq_hz: 0.15, damping: 0.005, participation: [ 0.0,  0.0, 40.0],
       rotates_with_array: true}  # 1st in-plane array bending
    - {freq_hz: 0.35, damping: 0.005, participation: [ 0.0, 25.0,  0.0]}  # torsion (pitch, angle-invariant)
    - {freq_hz: 0.55, damping: 0.005, participation: [20.0,  0.0,  0.0],
       rotates_with_array: true}  # 2nd out-of-plane bending

orbit_rate: 7.2921159e-5  # GEO sidereal rate, rad/s

wheels:
  ideal: false        # true = unlimited torque source, no momentum tracking
  max_torque: 0.2     # N*m, per body axis
  max_momentum: 68.0  # N*m*s, per body axis

sensors:
  perfect: false
  # Gyro sampled at the 16 Hz controller rate. Per-sample sigma is scaled
  # for a constant angle-random-walk density (sigma ~ sqrt(rate)): 2e-6 at
  # 16 Hz carries the same ARW as 1e-6 at 4 Hz.
  gyro_rate_noise: 2.0e-6          # rad/s 1-sigma, per axis per sample
  gyro_bias: [2.0e-7, -1.0e-7, 1.5e-7]  # rad/s initial bias
  gyro_bias_walk: 1.0e-8           # rad/s per sqrt(s), bias random walk
  star_tracker_noise_arcsec: 10.0  # 1-sigma per axis, per quaternion
  seed: 42

# Multiplicative EKF (attitude error + gyro bias). Gyro propagation runs at
# the controller rate; star tracker updates are decimated to their own rate.
# When disabled the controller consumes raw sensor outputs.
estimator:
  enabled: true
  star_tracker_rate_hz: 8.0
  p0_att_deg: 0.1      # initial attitude uncertainty, 1-sigma
  p0_bias_dps: 1.0e-3  # initial gyro bias uncertainty, 1-sigma

environment:
  gravity_gradient: true
  srp:
    enabled: true
    constant: [1.0e-5, 5.0e-5, 1.0e-5]            # N*m, body frame
    harmonic_amplitude: [5.0e-5, 0.0, 5.0e-5]     # N*m at orbit rate

# Reaction-wheel momentum unload policy. The constant pitch SRP torque
# accumulates ~4.3 N*m*s/day, so the wheels need an unload roughly every
# 1-2 weeks. The actuation is the RCS couples below (rcs.couples) fired in
# minimum-impulse pulses — real force x moment arm, not an abstract torque.
# Note: a single min-impulse couple pulse (~0.7 N*m*s) far exceeds the wheel
# torque limit, so unloads DO disturb pointing; schedule them outside
# precision-pointing windows.
unload:
  enabled: false       # `acs unload` enables this for its demo
  trigger: 40.0        # N*m*s: start unload when any axis exceeds
  target: 2.0          # N*m*s: stop when all axes below
  rate_gain: 0.002     # 1/s: requested torque = gain * h_w (sets pulse density)
  feedforward_compensation: true  # wheels absorb what they can of the couple

# Reaction-control thrusters for stationkeeping burns (see docs/thrusters.svg
# and `acs thrusters` for the geometry table). Bus half-dimensions ~1.25 (x,
# east/west) x 1.15 (y, north/south) x 1.75 (z, nadir/anti-nadir) m.
#
# The four thrusters on each north/south face sit at the face corners and
# are canted 20 deg in +/-Z (opposite senses top/bottom) so the plumes clear
# the array wing on that side AND the group's net torque and net radial
# force are exactly zero with all four firing: pure delta-V, with 3-axis
# differential (off-pulse) control authority of ~18.5 / 6.2 / 16.9 N*m in
# roll / pitch / yaw. East/west pairs cover east-west stationkeeping.
rcs:
  isp_s: 290.0
  min_on_time_s: 0.02
  cm_offset: [0.02, 0.03, 0.05]  # m, actual CM minus nominal: burn disturbance
  thrusters:
    - {name: N1, position: [ 0.9,  1.15,  1.4], direction: [0.0, -0.940, -0.342], force: 10.0}
    - {name: N2, position: [-0.9,  1.15,  1.4], direction: [0.0, -0.940, -0.342], force: 10.0}
    - {name: N3, position: [ 0.9,  1.15, -1.4], direction: [0.0, -0.940,  0.342], force: 10.0}
    - {name: N4, position: [-0.9,  1.15, -1.4], direction: [0.0, -0.940,  0.342], force: 10.0}
    - {name: S1, position: [ 0.9, -1.15,  1.4], direction: [0.0,  0.940, -0.342], force: 10.0}
    - {name: S2, position: [-0.9, -1.15,  1.4], direction: [0.0,  0.940, -0.342], force: 10.0}
    - {name: S3, position: [ 0.9, -1.15, -1.4], direction: [0.0,  0.940,  0.342], force: 10.0}
    - {name: S4, position: [-0.9, -1.15, -1.4], direction: [0.0,  0.940,  0.342], force: 10.0}
    - {name: E1, position: [ 1.25, 0.0,  1.4], direction: [-1.0, 0.0, 0.0], force: 10.0}
    - {name: E2, position: [ 1.25, 0.0, -1.4], direction: [-1.0, 0.0, 0.0], force: 10.0}
    - {name: W1, position: [-1.25, 0.0,  1.4], direction: [ 1.0, 0.0, 0.0], force: 10.0}
    - {name: W2, position: [-1.25, 0.0, -1.4], direction: [ 1.0, 0.0, 0.0], force: 10.0}
  groups:
    north: [S1, S2, S3, S4]  # thrust +Y: north delta-V (NSSK)
    south: [N1, N2, N3, N4]  # thrust -Y
    east:  [W1, W2]          # thrust +X
    west:  [E1, E2]          # thrust -X
  # Pure-torque couples for zero-delta-V attitude hold: opposite-face sets
  # whose net force cancels exactly (about the nominal CM). Authority:
  # roll +/-37 N*m, pitch +/-28 N*m, yaw +/-34 N*m.
  couples:
    roll+:  [S3, S4, N1, N2]
    roll-:  [S1, S2, N3, N4]
    pitch+: [E2, W1]
    pitch-: [E1, W2]
    yaw+:   [S1, S3, N2, N4]
    yaw-:   [S2, S4, N1, N3]

# Stationkeeping burn (`acs burn` enables delta_v if zero) with phase-plane
# attitude control: wheels held, burn thrusters off-pulsed per axis when the
# switching function s = theta + rate_lead*omega leaves the deadband.
stationkeeping:
  burn:
    group: north
    delta_v: 0.0        # m/s along the group net-force direction; 0 = off
    start_time_s: 100.0
  phase_plane:
    # Tuned by the attitude-hold sweep (deadband/hysteresis/lead vs
    # propellant rate and slosh pumping): 0.5 deg / 0.3 / 30 s gives a
    # near-ballistic hold limit cycle (~1 g/hr, slosh peak 0.14) where
    # tighter deadbands with long lead chatter on slosh rate content
    # (1.6 kg/hr at 0.25 deg / 30 s) and short leads pump slosh harder.
    # Pointing is relaxed to ~0.5 deg during thruster modes - typical GEO
    # practice; tighten only against a payload requirement and retune.
    deadband_deg: 0.5
    rate_lead_s: 30.0
    hysteresis: 0.3        # unused: superseded by the drift-channel exit
    # Drift channel: outside the hold channel the thrusters stay OFF while
    # the rate carries the state back at >= min_drift_rate (up to the rate
    # limit); firing only establishes/restores that drift rate
    min_drift_rate_dps: 0.01
    rate_limit_dps: 0.05
    mod_depth: 0.5      # off-pulse duty reduction on the opposing subset

controller:
  rate_hz: 16.0      # discrete execution rate = gyro sampling rate
  delay_s: 0.0       # additional computation delay (frequency analysis)
  feedforward: true  # J*alpha_cmd feedforward during profiled slews
  # Gains are computed per axis from the design rule (Kp = J*wn^2,
  # Kd = 2*zeta*J*wn, Ki = Kp*wn/integral_time_factor) unless kp/ki/kd are
  # given explicitly below.
  # Post-sysID all-angle robust design (selected by Monte Carlo: 100% pass
  # at inertia +/-10%, ARRAY MODE FREQ +/-5%, damping 0.005-0.01,
  # participation +/-20%, slosh freq +/-50%, array angle uniform over the
  # revolution).
  #
  # DERIVED OPERATIONS REQUIREMENT: on-orbit modal identification of the
  # array bending modes to +/-5% frequency. That knowledge lets the notches
  # narrow (damping 0.40 vs 1.0), halving their crossover phase lag, which
  # buys roll/yaw bandwidth 7.5 -> 20 mHz. The payoff is slosh rejection:
  # crossover sits ~2x above the dispersed slosh band, so |S| at 10 mHz
  # improves from +0.9 dB (mild amplification) to -13.4 dB (active damping).
  # Roll and yaw stay symmetric (the daily array rotation exchanges their
  # bending modes); pitch carries only the angle-invariant torsion mode.
  design:
    bandwidth_hz: [0.020, 0.030, 0.020]  # roll, pitch, yaw
    damping: 0.75
    integral_time_factor: 15.0  # longer Ti trims integrator lag at crossover
  # kp: [...]   # explicit per-axis gains override the design rule
  # ki: [...]
  # kd: [...]
  filters:
    - {type: notch, freq_hz: 0.110, damping: 0.40, depth_db: 42.0, axes: roll}  # 1st out-of-plane bending band
    - {type: notch, freq_hz: 0.158, damping: 0.40, depth_db: 38.0, axes: roll}  # 1st in-plane bending band
    - {type: notch, freq_hz: 0.558, damping: 0.40, depth_db: 30.0, axes: roll}  # 2nd bending band
    - {type: notch, freq_hz: 0.110, damping: 0.40, depth_db: 42.0, axes: yaw}
    - {type: notch, freq_hz: 0.158, damping: 0.40, depth_db: 38.0, axes: yaw}
    - {type: notch, freq_hz: 0.558, damping: 0.40, depth_db: 30.0, axes: yaw}
    - {type: notch, freq_hz: 0.393, damping: 0.50, depth_db: 35.0, axes: pitch} # torsion (coupled, J_pitch=3000)
    - {type: lowpass, freq_hz: 0.280, damping: 0.4, axes: roll}
    - {type: lowpass, freq_hz: 0.202, damping: 0.4, axes: pitch}
    - {type: lowpass, freq_hz: 0.280, damping: 0.4, axes: yaw}

guidance:
  mode: nadir   # track the LVLH frame (z to nadir) at orbit rate
  # mode: inertial with q_inertial: [w, x, y, z] holds a fixed attitude
  # Note on step size: with the default gains the wheels saturate for
  # attitude errors above a few hundredths of a degree, so any sizable raw
  # step becomes a torque-limited slew with saturation-driven overshoot.
  # Use the slew profiler (below) for large-angle maneuvers.
  step:
    axis: [1.0, 0.0, 0.0]  # body axis of the commanded attitude step / slew
    angle_deg: 1.0
    time_s: 100.0
  # Smooth slew profiler: when enabled, the step above is executed as an
  # eigenaxis slew with a cycloidal (continuous-acceleration) profile, and
  # the controller applies J*alpha_cmd acceleration feedforward (see
  # controller.feedforward). When disabled the step is discontinuous.
  profiler:
    enabled: false
    max_rate_dps: 0.05      # deg/s
    # Slosh-quiet acceleration: a 1-deg slew takes 286 s (~2 slosh periods),
    # placing the profile's spectral rolloff/nulls over the slosh band.
    # Post-slew ringing 2.9-5.5 arcsec across +/-30% slosh frequency error
    # (vs 35 arcsec at 0.001 deg/s^2). Smaller slews are quiet by amplitude,
    # larger ones by their naturally longer duration (~sqrt(angle)).
    max_accel_dps2: 1.0e-4  # deg/s^2 (J*a ~ 0.026 N*m on roll, well inside wheels)

simulation:
  duration_s: 900.0
  substeps: 3           # RK4 steps per 16 Hz controller sample (~21 ms)
  settling_band: 0.02   # settling criterion, fraction of step amplitude
  initial_wheel_momentum: [0.0, 0.0, 0.0]  # N*m*s

# Plant-dispersion Monte Carlo (`acs mc`): the controller stays fixed at its
# as-designed values while the plant is dispersed (uniform distributions,
# percentages are half-widths). Scored against GM >= 6 dB, PM >= 30 deg,
# mode peak <= -6 dB, closed-loop stable.
monte_carlo:
  n_runs: 100
  seed: 1
  time_domain: false    # also run the nonlinear sim per sample (slower)
  dispersions:
    inertia_pct: 10.0
    # +/-5% REQUIRES on-orbit modal identification of the array modes (the
    # pre-ID design point at +/-15% needs the wide-notch 7.5 mHz gains)
    mode_freq_pct: 5.0
    mode_damping_range: [0.005, 0.01]  # structural damping floor 0.5%
    participation_pct: 20.0
    # Slosh predictions are far softer than structural-mode predictions.
    # The damping range assumes the PMD tank requirement (>= 0.004); with a
    # bare-tank floor of 0.001 the pass rate drops to ~65% (min PM ~15 deg).
    slosh_freq_pct: 50.0
    slosh_mass_pct: 30.0
    slosh_damping_range: [0.004, 0.02]  # log-uniform
