<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 720" font-family="sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 Z" fill="#c0392b"/>
    </marker>
    <marker id="arrAx" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 Z" fill="#2c3e50"/>
    </marker>
  </defs>
  <rect width="1600" height="720" fill="#f8f9fa"/>
  <text x="800" y="34" text-anchor="middle" font-size="22" fill="#2c3e50" font-weight="bold">
    RCS thruster layout — 12 × 10 N (N/S faces canted 20° in ±Z: plumes clear the arrays, group net torque = 0)</text>

  <!-- ================= VIEW A: from east (+X toward -X) ================= -->
  <g id="viewA">
    <text x="400" y="72" text-anchor="middle" font-size="16" fill="#2c3e50" font-weight="bold">View from east (+X): Y–Z plane</text>
    <!-- bus outline: y right (north), z down (nadir) -->
    <rect x="239" y="105" width="322" height="490" fill="#f7ecd0" stroke="#8a6d1f" stroke-width="2"/>
    <text x="400" y="300" text-anchor="middle" font-size="13" fill="#8a6d1f">bus 2.3 m (Y) × 3.5 m (Z)</text>
    <!-- CM -->
    <circle cx="400" cy="350" r="6" fill="none" stroke="#2c3e50" stroke-width="1.5"/>
    <path d="M394 350 H406 M400 344 V356" stroke="#2c3e50" stroke-width="1.5"/>
    <text x="400" y="375" text-anchor="middle" font-size="12" fill="#2c3e50">CM (nominal)</text>
    <!-- face labels -->
    <text x="575" y="352" font-size="12" fill="#5b6570" transform="rotate(-90 575 352)" text-anchor="middle">north face (+Y)</text>
    <text x="225" y="352" font-size="12" fill="#5b6570" transform="rotate(-90 225 352)" text-anchor="middle">south face (−Y)</text>
    <text x="400" y="98" text-anchor="middle" font-size="12" fill="#5b6570">anti-nadir face (−Z)</text>
    <text x="400" y="612" text-anchor="middle" font-size="12" fill="#5b6570">nadir face (+Z, to Earth)</text>
    <!-- N1/N2 at (y=+1.15, z=+1.4): screen (561, 546); thrust (-0.94, -0.342) -->
    <g stroke="#c0392b" stroke-width="2.5" fill="none">
      <path d="M561 546 L495 522" marker-end="url(#arr)"/>
      <path d="M561 154 L495 178" marker-end="url(#arr)"/>
      <path d="M239 546 L305 522" marker-end="url(#arr)"/>
      <path d="M239 154 L305 178" marker-end="url(#arr)"/>
    </g>
    <!-- nozzles (exhaust side, outside the face) -->
    <g fill="#7d8590">
      <path d="M561 540 L575 534 L575 558 L561 552 Z"/>
      <path d="M561 148 L575 142 L575 166 L561 160 Z"/>
      <path d="M239 540 L225 534 L225 558 L239 552 Z"/>
      <path d="M239 148 L225 142 L225 166 L239 160 Z"/>
    </g>
    <g font-size="13" fill="#c0392b" font-weight="bold">
      <text x="590" y="551">N1, N2</text>
      <text x="590" y="159">N3, N4</text>
      <text x="152" y="551">S1, S2</text>
      <text x="152" y="159">S3, S4</text>
    </g>
    <!-- cant angle annotation at N1/N2 -->
    <path d="M561 546 h-46" stroke="#5b6570" stroke-width="1" stroke-dasharray="4 3"/>
    <path d="M521 546 A40 40 0 0 0 524 532" fill="none" stroke="#5b6570" stroke-width="1.2"/>
    <text x="500" y="562" font-size="12" fill="#5b6570">20°</text>
    <!-- E/W thrusters: out-of-plane symbols at (y=0, z=±1.4) -->
    <g stroke="#2471a3" stroke-width="1.8" fill="none">
      <circle cx="384" cy="546" r="9"/><path d="M378 540 L390 552 M390 540 L378 552"/>
      <circle cx="416" cy="546" r="9"/><circle cx="416" cy="546" r="2" fill="#2471a3"/>
      <circle cx="384" cy="154" r="9"/><path d="M378 148 L390 160 M390 148 L378 160"/>
      <circle cx="416" cy="154" r="9"/><circle cx="416" cy="154" r="2" fill="#2471a3"/>
    </g>
    <g font-size="12" fill="#2471a3">
      <text x="384" y="575" text-anchor="end">E1 ⊗ (−X)</text><text x="416" y="575">  W1 ⊙ (+X)</text>
      <text x="384" y="130" text-anchor="end">E2 ⊗  </text><text x="424" y="130">W2 ⊙</text>
    </g>
    <!-- axes triad -->
    <g stroke="#2c3e50" stroke-width="2" fill="none">
      <path d="M80 640 h55" marker-end="url(#arrAx)"/>
      <path d="M80 640 v-55" marker-end="url(#arrAx)"/>
      <circle cx="80" cy="640" r="8"/>
      <circle cx="80" cy="640" r="2" fill="#2c3e50"/>
    </g>
    <g font-size="13" fill="#2c3e50">
      <text x="142" y="645">+Y (north)</text>
      <text x="66" y="572">−Z</text>
      <text x="95" y="662">+X (east, out of page)</text>
    </g>
  </g>

  <!-- ================= VIEW B: from nadir (looking -Z) ================= -->
  <g id="viewB">
    <text x="1180" y="72" text-anchor="middle" font-size="16" fill="#2c3e50" font-weight="bold">View from nadir (looking −Z at the Earth deck): X–Y plane</text>
    <!-- array stubs along +/-Y -->
    <g fill="#3540a0" stroke="#6b7ada">
      <rect x="1145" y="90" width="70" height="52" opacity="0.85"/>
      <rect x="1145" y="578" width="70" height="52" opacity="0.85"/>
      <rect x="1173" y="142" width="14" height="27" fill="#9aa3ae" stroke="none"/>
      <rect x="1173" y="551" width="14" height="27" fill="#9aa3ae" stroke="none"/>
    </g>
    <text x="1252" y="112" font-size="12" fill="#3540a0">north array wing (+Y) →</text>
    <text x="1252" y="612" font-size="12" fill="#3540a0">south array wing (−Y) →</text>
    <!-- bus: x right (east), y up (north) -->
    <rect x="1005" y="169" width="350" height="322" fill="#f7ecd0" stroke="#8a6d1f" stroke-width="2"/>
    <text x="1180" y="285" text-anchor="middle" font-size="13" fill="#8a6d1f">earth deck, 2.5 m (X) × 2.3 m (Y)</text>
    <circle cx="1180" cy="330" r="6" fill="none" stroke="#2c3e50" stroke-width="1.5"/>
    <path d="M1174 330 H1186 M1180 324 V336" stroke="#2c3e50" stroke-width="1.5"/>
    <text x="1180" y="355" text-anchor="middle" font-size="12" fill="#2c3e50">CM</text>
    <!-- N thrusters on +Y edge at x=±0.9; force -Y (down); z-cants out/in of page -->
    <g stroke="#c0392b" stroke-width="2.5" fill="none">
      <path d="M1306 169 L1306 224" marker-end="url(#arr)"/>
      <path d="M1054 169 L1054 224" marker-end="url(#arr)"/>
      <path d="M1306 491 L1306 436" marker-end="url(#arr)"/>
      <path d="M1054 491 L1054 436" marker-end="url(#arr)"/>
    </g>
    <g fill="#7d8590">
      <path d="M1300 169 L1294 155 L1318 155 L1312 169 Z"/>
      <path d="M1048 169 L1042 155 L1066 155 L1060 169 Z"/>
      <path d="M1300 491 L1294 505 L1318 505 L1312 491 Z"/>
      <path d="M1048 491 L1042 505 L1066 505 L1060 491 Z"/>
    </g>
    <g font-size="13" fill="#c0392b" font-weight="bold">
      <text x="1322" y="150">N1, N3</text>
      <text x="990" y="150" text-anchor="end">N2, N4</text>
      <text x="1322" y="522">S1, S3</text>
      <text x="990" y="522" text-anchor="end">S2, S4</text>
    </g>
    <text x="1180" y="463" text-anchor="middle" font-size="11" fill="#5b6570">N/S thrust z-cants (⊗ top pair, ⊙ bottom pair) shown in the east view</text>
    <!-- E/W on the x edges: force +/-X -->
    <g stroke="#2471a3" stroke-width="2.5" fill="none">
      <path d="M1355 330 L1300 330" marker-end="url(#arr)"/>
      <path d="M1005 330 L1060 330" marker-end="url(#arr)"/>
    </g>
    <g fill="#7d8590">
      <path d="M1355 324 L1369 318 L1369 342 L1355 336 Z"/>
      <path d="M1005 324 L991 318 L991 342 L1005 336 Z"/>
    </g>
    <g font-size="13" fill="#2471a3" font-weight="bold">
      <text x="1374" y="335">E1, E2</text>
      <text x="986" y="335" text-anchor="end">W1, W2</text>
    </g>
    <!-- axes triad -->
    <g stroke="#2c3e50" stroke-width="2" fill="none">
      <path d="M880 640 h55" marker-end="url(#arrAx)"/>
      <path d="M880 640 v-55" marker-end="url(#arrAx)"/>
      <circle cx="880" cy="640" r="8"/>
      <circle cx="880" cy="640" r="2" fill="#2c3e50"/>
    </g>
    <g font-size="13" fill="#2c3e50">
      <text x="942" y="645">+X (east)</text>
      <text x="866" y="572">+Y</text>
      <text x="895" y="662">+Z (nadir, out of page)</text>
    </g>
  </g>

  <text x="800" y="702" text-anchor="middle" font-size="13" fill="#5b6570">
    Red arrows: thrust force on the spacecraft (nozzles shown gray on the exhaust side). Groups: north ΔV = S1–S4, south ΔV = N1–N4, east ΔV = W1–W2, west ΔV = E1–E2.</text>
</svg>
