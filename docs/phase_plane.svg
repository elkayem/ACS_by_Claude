<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 540" font-family="sans-serif" font-size="15">
  <rect width="900" height="540" fill="#ffffff"/>
  <!-- attitude hold channel between phi + k_d*phidot = +/-delta -->
  <polygon points="150,60 330,60 750,460 570,460" fill="#bfeef5"/>
  <!-- drift channels: omega between omega_DR and omega_RL, outside the lines -->
  <polygon points="60,120 213,120 304,207 60,207" fill="#f9e79f"/>
  <polygon points="596,313 840,313 840,400 687,400" fill="#f9e79f"/>
  <!-- switching lines, dashed ONLY where they border a firing region -->
  <line x1="330" y1="60" x2="596" y2="313" stroke="#555" stroke-width="2" stroke-dasharray="8 6"/>
  <line x1="304" y1="207" x2="570" y2="460" stroke="#555" stroke-width="2" stroke-dasharray="8 6"/>
  <!-- axes -->
  <line x1="60" y1="260" x2="840" y2="260" stroke="#222" stroke-width="1.5"/>
  <line x1="450" y1="40" x2="450" y2="480" stroke="#222" stroke-width="1.5"/>
  <text x="850" y="265">φ</text>
  <text x="438" y="30">φ̇</text>
  <line x1="443" y1="120" x2="457" y2="120" stroke="#222"/>
  <text x="404" y="115" font-size="13">+ω_RL</text>
  <line x1="443" y1="207" x2="457" y2="207" stroke="#222"/>
  <text x="400" y="202" font-size="13">+ω_DR</text>
  <line x1="443" y1="313" x2="457" y2="313" stroke="#222"/>
  <text x="462" y="330" font-size="13">−ω_DR</text>
  <line x1="443" y1="400" x2="457" y2="400" stroke="#222"/>
  <text x="462" y="417" font-size="13">−ω_RL</text>
  <line x1="540" y1="253" x2="540" y2="267" stroke="#222"/>
  <text x="532" y="285" font-size="13">+δ</text>
  <text x="115" y="95" font-weight="bold" fill="#8a6d1f">drift channel</text>
  <text x="690" y="368" font-weight="bold" fill="#8a6d1f">drift channel</text>
  <text x="330" y="230" font-weight="bold" fill="#0e7490" transform="rotate(44 330 230)">attitude hold channel (coast)</text>
  <text x="620" y="120" font-weight="bold" fill="#c0392b">negative firing</text>
  <text x="620" y="142" font-size="13" fill="#c0392b">φ + k_d·φ̇ &gt; δ  and  φ̇ &gt; −ω_DR</text>
  <text x="80" y="395" font-weight="bold" fill="#c0392b">positive firing</text>
  <text x="80" y="417" font-size="13" fill="#c0392b">φ + k_d·φ̇ &lt; −δ  and  φ̇ &lt; +ω_DR</text>
  <text x="60" y="505" font-size="13" fill="#555">|φ̇| &gt; ω_RL anywhere: fire against the rate. Firing stops once the return drift reaches ω_DR;</text>
  <text x="60" y="524" font-size="13" fill="#555">the drift channel then carries the state back to the hold channel unpowered.</text>
</svg>
