<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 440" font-family="sans-serif">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#04060e"/>
      <stop offset="0.6" stop-color="#070b18"/>
      <stop offset="1" stop-color="#0a1124"/>
    </linearGradient>
    <radialGradient id="nebula" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#4a86d8" stop-opacity="0.34"/>
      <stop offset="0.45" stop-color="#2e5ea8" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#0a1124" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nebula2" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#7fb0e8" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#0a1124" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sunglow" cx="0.88" cy="0.10" r="0.55">
      <stop offset="0" stop-color="#fff7dc" stop-opacity="0.16"/>
      <stop offset="0.35" stop-color="#ffedb8" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#232a66"/>
      <stop offset="0.25" stop-color="#3540a0"/>
      <stop offset="0.55" stop-color="#4553c4"/>
      <stop offset="0.8" stop-color="#303890"/>
      <stop offset="1" stop-color="#1d2358"/>
    </linearGradient>
    <linearGradient id="panelSheen" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#bcd4ff" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="mli" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f2d581"/>
      <stop offset="0.35" stop-color="#c99f3a"/>
      <stop offset="0.7" stop-color="#9a742a"/>
      <stop offset="1" stop-color="#6e5220"/>
    </linearGradient>
    <linearGradient id="boom" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d8dde4"/>
      <stop offset="1" stop-color="#7d8590"/>
    </linearGradient>
    <radialGradient id="dishFace" cx="0.38" cy="0.30" r="0.95">
      <stop offset="0" stop-color="#fbfcfe"/>
      <stop offset="0.45" stop-color="#e2e7ee"/>
      <stop offset="0.8" stop-color="#bcc6d2"/>
      <stop offset="1" stop-color="#95a1b0"/>
    </radialGradient>
    <linearGradient id="radiator" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f4f7fb"/>
      <stop offset="1" stop-color="#b9c4d4"/>
    </linearGradient>
  </defs>

  <!-- deep space -->
  <rect width="1600" height="440" fill="url(#sky)"/>
  <ellipse cx="820" cy="240" rx="560" ry="300" fill="url(#nebula)"/>
  <ellipse cx="640" cy="140" rx="300" ry="180" fill="url(#nebula2)"/>
  <rect width="1600" height="440" fill="url(#sunglow)"/>
  <g fill="#ffffff">
    <circle cx="63" cy="52" r="1.1" opacity="0.8"/><circle cx="142" cy="188" r="0.8" opacity="0.5"/>
    <circle cx="221" cy="75" r="1.3" opacity="0.9"/><circle cx="305" cy="341" r="0.7" opacity="0.5"/>
    <circle cx="388" cy="132" r="0.9" opacity="0.6"/><circle cx="451" cy="47" r="1.2" opacity="0.7"/>
    <circle cx="533" cy="392" r="0.8" opacity="0.5"/><circle cx="597" cy="86" r="0.7" opacity="0.6"/>
    <circle cx="668" cy="30" r="1.0" opacity="0.8"/><circle cx="742" cy="404" r="0.9" opacity="0.5"/>
    <circle cx="815" cy="55" r="0.8" opacity="0.6"/><circle cx="880" cy="371" r="1.1" opacity="0.6"/>
    <circle cx="957" cy="99" r="0.7" opacity="0.6"/><circle cx="1026" cy="26" r="1.2" opacity="0.8"/>
    <circle cx="1105" cy="335" r="0.8" opacity="0.5"/><circle cx="1170" cy="151" r="1.0" opacity="0.7"/>
    <circle cx="1246" cy="63" r="0.8" opacity="0.6"/><circle cx="1318" cy="392" r="1.0" opacity="0.5"/>
    <circle cx="1387" cy="115" r="1.2" opacity="0.8"/><circle cx="1462" cy="243" r="0.7" opacity="0.5"/>
    <circle cx="1529" cy="58" r="1.0" opacity="0.7"/><circle cx="1575" cy="316" r="0.8" opacity="0.5"/>
    <circle cx="97" cy="286" r="0.7" opacity="0.5"/><circle cx="356" cy="223" r="0.7" opacity="0.4"/>
    <circle cx="700" cy="180" r="0.6" opacity="0.4"/><circle cx="1080" cy="205" r="0.6" opacity="0.4"/>
    <circle cx="510" cy="160" r="0.7" opacity="0.4"/><circle cx="1440" cy="180" r="0.8" opacity="0.5"/>
    <circle cx="622" cy="58" r="1.4" opacity="0.9"/><circle cx="920" cy="140" r="1.0" opacity="0.6"/>
  </g>

  <!-- ==================== solar arrays (N-S wings, left-right) ==================== -->
  <g id="wings">
    <rect x="120" y="216" width="590" height="7" fill="url(#boom)"/>
    <rect x="890" y="216" width="590" height="7" fill="url(#boom)"/>
    <path d="M712 219 L748 204 L748 234 Z" fill="#9aa3ae"/>
    <path d="M888 219 L852 204 L852 234 Z" fill="#9aa3ae"/>
    <g>
      <rect x="118" y="164" width="140" height="110" rx="3" fill="url(#panel)" stroke="#6b7ada" stroke-width="1.4"/>
      <rect x="264" y="164" width="140" height="110" rx="3" fill="url(#panel)" stroke="#6b7ada" stroke-width="1.4"/>
      <rect x="410" y="164" width="140" height="110" rx="3" fill="url(#panel)" stroke="#6b7ada" stroke-width="1.4"/>
      <rect x="556" y="164" width="140" height="110" rx="3" fill="url(#panel)" stroke="#6b7ada" stroke-width="1.4"/>
      <rect x="904" y="164" width="140" height="110" rx="3" fill="url(#panel)" stroke="#6b7ada" stroke-width="1.4"/>
      <rect x="1050" y="164" width="140" height="110" rx="3" fill="url(#panel)" stroke="#6b7ada" stroke-width="1.4"/>
      <rect x="1196" y="164" width="140" height="110" rx="3" fill="url(#panel)" stroke="#6b7ada" stroke-width="1.4"/>
      <rect x="1342" y="164" width="140" height="110" rx="3" fill="url(#panel)" stroke="#6b7ada" stroke-width="1.4"/>
    </g>
    <g stroke="#141a45" stroke-width="1" opacity="0.9">
      <path d="M118 191 h578 M118 219 h578 M118 247 h578 M904 191 h578 M904 219 h578 M904 247 h578"/>
      <path d="M146 164 v110 M175 164 v110 M204 164 v110 M233 164 v110
               M292 164 v110 M321 164 v110 M350 164 v110 M379 164 v110
               M438 164 v110 M467 164 v110 M496 164 v110 M525 164 v110
               M584 164 v110 M613 164 v110 M642 164 v110 M671 164 v110
               M932 164 v110 M961 164 v110 M990 164 v110 M1019 164 v110
               M1078 164 v110 M1107 164 v110 M1136 164 v110 M1165 164 v110
               M1224 164 v110 M1253 164 v110 M1282 164 v110 M1311 164 v110
               M1370 164 v110 M1399 164 v110 M1428 164 v110 M1457 164 v110"/>
    </g>
    <rect x="118" y="164" width="578" height="110" fill="url(#panelSheen)"/>
    <rect x="904" y="164" width="578" height="110" fill="url(#panelSheen)"/>
    <g fill="#c8cfd8">
      <rect x="256" y="176" width="10" height="86" rx="2"/><rect x="402" y="176" width="10" height="86" rx="2"/>
      <rect x="548" y="176" width="10" height="86" rx="2"/><rect x="1042" y="176" width="10" height="86" rx="2"/>
      <rect x="1188" y="176" width="10" height="86" rx="2"/><rect x="1334" y="176" width="10" height="86" rx="2"/>
    </g>
  </g>

  <!-- ==================== east / west deployed reflectors ==================== -->
  <!-- with the wings north-south across the frame, east and west deploy
       toward the viewer's top and bottom in this nadir-facing view -->
  <g id="dish-west">
    <rect x="794" y="140" width="12" height="28" fill="#8d97a4"/>
    <ellipse cx="800" cy="88" rx="66" ry="58" fill="url(#dishFace)" stroke="#7c8898" stroke-width="2"/>
    <g fill="none" stroke="#8d97a4" opacity="0.4">
      <ellipse cx="800" cy="88" rx="52" ry="45.5"/>
      <ellipse cx="800" cy="88" rx="37" ry="32.5"/>
      <ellipse cx="800" cy="88" rx="22" ry="19.5"/>
      <path d="M800 30 V146 M734 88 H866 M753 47 L847 129 M847 47 L753 129"/>
    </g>
    <ellipse cx="778" cy="66" rx="26" ry="20" fill="#ffffff" opacity="0.35"/>
    <circle cx="800" cy="88" r="5" fill="#4a525c"/>
  </g>
  <g id="dish-east">
    <rect x="794" y="272" width="12" height="28" fill="#79828e"/>
    <ellipse cx="800" cy="352" rx="66" ry="58" fill="url(#dishFace)" stroke="#7c8898" stroke-width="2"/>
    <g fill="none" stroke="#8d97a4" opacity="0.4">
      <ellipse cx="800" cy="352" rx="52" ry="45.5"/>
      <ellipse cx="800" cy="352" rx="37" ry="32.5"/>
      <ellipse cx="800" cy="352" rx="22" ry="19.5"/>
      <path d="M800 294 V410 M734 352 H866 M753 311 L847 393 M847 311 L753 393"/>
    </g>
    <ellipse cx="778" cy="330" rx="26" ry="20" fill="#ffffff" opacity="0.32"/>
    <circle cx="800" cy="352" r="5" fill="#4a525c"/>
  </g>

  <!-- ==================== hub (earth deck toward viewer) ==================== -->
  <g id="hub">
    <rect x="752" y="162" width="96" height="116" fill="url(#mli)" rx="3"/>
    <g opacity="0.35">
      <rect x="752" y="176" width="96" height="4" fill="#fff2c0"/>
      <rect x="752" y="199" width="96" height="3" fill="#7a5c20"/>
      <rect x="752" y="226" width="96" height="4" fill="#ffe9a5"/>
      <rect x="752" y="252" width="96" height="3" fill="#7a5c20"/>
      <rect x="752" y="266" width="96" height="3" fill="#fff2c0"/>
      <rect x="768" y="162" width="3" height="116" fill="#8a6a25"/>
      <rect x="806" y="162" width="4" height="116" fill="#ffeaa8"/>
      <rect x="830" y="162" width="3" height="116" fill="#8a6a25"/>
    </g>
    <!-- radiator panels on the north/south edges -->
    <rect x="754" y="166" width="9" height="108" fill="url(#radiator)" rx="2"/>
    <rect x="837" y="166" width="9" height="108" fill="url(#radiator)" rx="2"/>
    <!-- earth-deck horns, face-on -->
    <g>
      <circle cx="800" cy="207" r="11" fill="#3a424c" stroke="#8f99a5" stroke-width="1.4"/>
      <circle cx="800" cy="207" r="6" fill="none" stroke="#aeb8c4" stroke-width="1"/>
      <circle cx="800" cy="207" r="2" fill="#d6dde5"/>
      <circle cx="779" cy="238" r="7" fill="#434b56" stroke="#8f99a5" stroke-width="1.2"/>
      <circle cx="779" cy="238" r="2.8" fill="none" stroke="#aeb8c4" stroke-width="0.9"/>
      <circle cx="821" cy="238" r="7" fill="#434b56" stroke="#8f99a5" stroke-width="1.2"/>
      <circle cx="821" cy="238" r="2.8" fill="none" stroke="#aeb8c4" stroke-width="0.9"/>
      <rect x="789" y="256" width="22" height="12" rx="2" fill="#39414a" stroke="#8f99a5" stroke-width="1"/>
    </g>
    <!-- star trackers on the corner -->
    <rect x="758" y="167" width="14" height="9" rx="2" fill="#2b3138" transform="rotate(-28 765 171)"/>
    <!-- thruster pods -->
    <g fill="#5b6570">
      <circle cx="757" cy="276" r="3.5"/><circle cx="843" cy="276" r="3.5"/>
      <circle cx="757" cy="165" r="3.5"/><circle cx="843" cy="165" r="3.5"/>
    </g>
  </g>
</svg>
